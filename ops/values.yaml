# Production value overrides for the corshub Helm chart.
#
# Only values that differ from the chart defaults are listed here.
# For the full set of tunables see helm/values.yaml.
# Pin to an explicit image tag in production; never use "latest".
image:
    repository: harbor.peinser.com/uas/corshub
    tag: 0.0.1.dev0-822f802
# README before scaling beyond 1 (in-process QueueTransport is per-pod).
replicaCount: 1
resources:
    requests:
        cpu: 250m
        memory: 512Mi
    limits:
        memory: 512Mi
# Classic Ingress (nginx-ingress or similar):
ingress:
    enabled: true
    className: nginx
    annotations:
        # NTRIP streams are long-lived, raise timeouts well above the default 60 s.
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        nginx.ingress.kubernetes.io/proxy-buffering: "off"
        nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
        cert-manager.io/cluster-issuer: letsencrypt-production
    hosts:
        - host: corshub.peinser.com
          paths:
            - path: /
              pathType: Prefix
    tls:
        - secretName: corshub-tls
          hosts:
            - corshub.peinser.com
metrics:
    enabled: true
    serviceMonitor:
        enabled: true
opa:
    enabled: true
    image:
        repository: harbor.peinser.com/dockerhub/openpolicyagent/opa
        tag: 1.15.2-static
    registry:
        # Map of base stations keyed by username / mountpoint.
        # valid_from / valid_until: optional ISO 8601 dates (YYYY-MM-DD).
        # Connections are denied before valid_from and on/after valid_until.
        base_stations:
            peinser-mobile:
                mountpoint: MOBILE-PEINSER-0
                valid_from: "2025-01-01"
                valid_until: "2027-01-01"
                password_hash: ENC[AES256_GCM,data:X/LzXBUs1RsesjZx8tfloQBtUYZ3ucVQRaMJb40JKBDefQIAHuvj4m6yjezxHmrZrx+OKa7ifLZs2nhs,iv:V+d2wuje7y3f7ljCB7lCd9O1IM2RxrbwqIhmeEltWEo=,tag:ZMEcdYVB9WXyc3tJ+mYS/A==,type:str]
        # Map of rovers keyed by username.
        # valid_from / valid_until: optional ISO 8601 dates (YYYY-MM-DD).
        rovers:
