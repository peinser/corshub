name: Onboard

on:
  pull_request_target:
    paths:
      - ops/values.yaml
    types: [opened, synchronize]

jobs:
  onboard:
    environment: Production
    runs-on:
      group: on-prem

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout base repo at HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Fetch ops/values.yaml from PR branch only
        run: |
          git fetch origin refs/pull/${{ github.event.pull_request.number }}/head:pr-head
          git checkout pr-head -- ops/values.yaml

      - name: Verify PR contains only additions to ops/values.yaml
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Lines removed from ops/values.yaml, excluding:
          #   - diff headers
          #   - password_hash (absent in a legitimate rotation PR)
          #   - SOPS metadata that changes on every sops write (lastmodified, mac)
          removed=$(git diff HEAD -- ops/values.yaml \
            | grep '^-' \
            | grep -v '^---' \
            | grep -v 'password_hash' \
            | grep -v 'lastmodified:' \
            | grep -v 'mac:')

          echo "Removed lines (after exclusions):"
          echo "${removed:-  (none)"}"
          [ -z "$removed" ] && exit 0

          echo "Violation detected — labelling and closing PR."

          api="https://api.github.com"
          auth=(-H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28")

          curl_check() {
            local desc="$1"; shift
            local out
            out=$(curl -sS -w "\n%{http_code}" "$@")
            local code="${out##*$'\n'}"
            local body="${out%$'\n'*}"
            echo "[$desc] HTTP $code"
            if [ "$code" -ge 400 ]; then
              echo "  response: $body"
              return 1
            fi
          }

          # Create or update the violation label (422 = already exists, ignore).
          curl_check "create label" -X POST "$api/repos/$REPO/labels" "${auth[@]}" \
            -d '{"name":"violation","color":"B60205","description":"PR removes or modifies existing configuration"}' || true

          curl_check "apply label" -X POST "$api/repos/$REPO/issues/$PR/labels" "${auth[@]}" \
            -d '{"labels":["violation"]}'

          body="This PR removes or modifies existing lines in ops/values.yaml.\n\nOnly additions are permitted. Changes to existing entries or other sections of the file must go through the repository maintainers directly.\n\nRemoved lines:\n\`\`\`diff\n${removed}\n\`\`\`\n\nThis PR has been closed. Open a new one containing only the additions for your entry."
          curl_check "post comment" -X POST "$api/repos/$REPO/issues/$PR/comments" "${auth[@]}" \
            -d "{\"body\":\"$body\"}"

          curl_check "close PR" -X PATCH "$api/repos/$REPO/pulls/$PR" "${auth[@]}" \
            -d '{"state":"closed"}'

          exit 1

      - name: Install Python dependencies
        run: pip3 install --quiet bcrypt PyYAML

      - name: Configure git identity for bot commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run onboarding script
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: python3 .github/scripts/onboard.py

      - name: Commit generated credentials
        run: |
          git add ops/values.yaml ops/key-fingerprints.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: issue credentials for new registry entries [skip ci]"
          git push
