name: Onboard

on:
  pull_request_target:
    paths:
      - ops/values.yaml
    types: [opened, synchronize]

jobs:
  onboard:
    environment: Production
    runs-on:
      group: on-prem

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout base repo at HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Fetch ops/values.yaml from PR branch only
        run: |
          git fetch origin refs/pull/${{ github.event.pull_request.number }}/head:pr-head
          git checkout pr-head -- ops/values.yaml

      - name: Install Python dependencies
        run: pip install --quiet bcrypt PyYAML

      - name: Configure git identity for bot commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run onboarding script
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: python3 .github/scripts/onboard.py

      - name: Commit generated credentials
        run: |
          git add ops/values.yaml ops/key-fingerprints.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: issue credentials for new registry entries [skip ci]"
          git push
