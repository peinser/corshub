name: 🚀 Deploy Production
run-name: "${{ github.actor }} is shipping to Production!"

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Helm chart version to deploy (e.g. 0.0.1-abc1234). Defaults to 'latest'."
        required: false
        default: latest
  push:
    branches:
      - main
    paths:
      - ops/**

env:
  CHART_VERSION: ${{ github.event.inputs.chart_version || 'latest' }}

jobs:
  deploy-production:
    environment: Production
    runs-on:
      group: on-prem

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .
            ops
          sparse-checkout-cone-mode: false
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.17.3"

      - name: Authenticate with the remote Container Registry
        run: |
          echo '${{ secrets.OCI_REGISTRY_HARBOR_SECRET }}' | helm registry login -u '${{ secrets.OCI_REGISTRY_HARBOR_LOGIN }}' --password-stdin ${{ vars.OCI_REGISTRY }}

      - name: Decrypt values.yaml
        run: |
          printf "%s" "${{ secrets.SOPS_AGE_KEY }}" | tr -d '\n' | tr -d '\r' > "$GITHUB_WORKSPACE/.age.key"
          chmod 600 "$GITHUB_WORKSPACE/.age.key"
          SOPS_AGE_KEY_FILE="$GITHUB_WORKSPACE/.age.key" sops -d ops/values.yaml > "$GITHUB_WORKSPACE/values-plain.yaml"
          rm -f "$GITHUB_WORKSPACE/.age.key"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to Kubernetes using Helm
        working-directory: ./ops
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig
          export KUBECONFIG=$(pwd)/kubeconfig

          echo "🛳️ Deploying to Kubernetes (chart: $CHART_VERSION)..."
          VERSION_FLAG=$([[ "$CHART_VERSION" != "latest" ]] && echo "--version $CHART_VERSION" || echo "")
          helm upgrade --install production \
            oci://${{ vars.OCI_REGISTRY }}/uas/charts/corshub \
            $VERSION_FLAG \
            --values "$GITHUB_WORKSPACE/values-plain.yaml" \
            --namespace corshub \
            --atomic \
            --timeout 120s

          echo "Deployment successful! 🎉"