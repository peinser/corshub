site_name: CORSHub
site_description: Python-based NTRIP caster for aggregating RTK corrections from a network of CORS base stations and distributing them to NTRIP clients.
site_author: Joeri Hermans
edit_uri: edit/main/docs/
repo_name: corshub
repo_url: https://github.com/peinser/corshub
copyright: Maintained by <a href="hello@peinser.com">Peinser</a>.

nav:
- Home:
  - Introduction: index.md
- Reference: reference/
plugins:
- search
- section-index
- literate-nav:
    nav_file: SUMMARY.md
- gen-files:
    scripts:
    - docs/gen_reference_pages.py
- mkdocstrings:
    watch:
    - src/corshub

theme:
  name: material
  features:
  - navigation.tabs
  - navigation.tabs.sticky
  - toc
  - toc.follow
  palette:
  - media: "(prefers-color-scheme: dark)"
    scheme: slate

extra_css:
- stylesheets/extra.css

markdown_extensions:
- pymdownx.arithmatex:
    generic: true

extra_javascript:
- javascripts/mathjax.js
- https://polyfill.io/v3/polyfill.min.js?features=es6
- https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false