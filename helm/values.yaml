# Default values for corshub.

# Number of replicas.
# NOTE: The default in-process QueueTransport is per-replica. For multi-replica
# deployments, base stations and rovers must connect to the same replica, or you
# must configure a shared transport backend (e.g. Redis). Use replicaCount: 1
# with autoscaling disabled until a shared transport is deployed.
replicaCount: 1

image:
  repository: docker.io/peinser/corshub
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart's appVersion.
  tag: ""

imagePullSecrets: []
  # name: harbor-registry-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

# Application-level settings.
app:
  # HTTP port the Sanic server listens on inside the container.
  port: 8000

# Extra environment variables injected into the container.
extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"

# Extra environment variables sourced from Secrets or ConfigMaps.
extraEnvFrom: []
  # - secretRef:
  #     name: corshub-secrets

service:
  type: ClusterIP
  port: 80
  annotations: {}
  clusterIP: ""
  # nodePort: 32080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 256Mi

# Restarts the container if the server stops responding.
livenessProbe:
  httpGet:
    path: /.info/healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 2

# Gates traffic until the server is ready.
readinessProbe:
  httpGet:
    path: /.info/healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 2

# Gives the process extra time to start before liveness kicks in.
startupProbe:
  httpGet:
    path: /.info/healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 12  # 12 * 5s = 60 s max startup time

# Graceful shutdown: allow in-flight NTRIP streams to drain before the pod is killed.
terminationGracePeriodSeconds: 30

# Horizontal Pod Autoscaler.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# Classic Kubernetes Ingress (networking.k8s.io/v1).
# Suitable for clusters running nginx-ingress, traefik, or similar controllers.
ingress:
  enabled: false
  # IngressClass name (e.g. "nginx", "traefik"). Leave empty to rely on
  # the cluster default or a kubernetes.io/ingress.class annotation.
  className: nginx
  annotations:
    # Extend connection timeouts for long-lived NTRIP streams (seconds) and enable RTCM streaming (disable buffering).
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    # TLS termination / certificate management.
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: corshub.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: corshub-tls
    #   hosts:
    #     - corshub.example.com

# Gateway API HTTPRoute (gateway.networking.k8s.io/v1).
# Suitable for clusters running Envoy Gateway, Istio, Cilium, or similar
# Gateway API-compliant controllers.
httpRoute:
  enabled: false
  # References to the parent Gateway objects that should serve this route.
  parentRefs:
    - name: gateway
      namespace: gateway-system
      # Bind to a specific listener (e.g. "https").
      # sectionName: https
  # Hostnames this route applies to.
  hostnames:
    - corshub.example.com
  # Route rules. The default rule matches all paths with no timeout so that
  # long-lived NTRIP streams (base stations and rovers) are never torn down by
  # the gateway. Override or add rules as needed.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        # 0s means no timeout. Required for persistent NTRIP streams.
        request: "0s"
        backendRequest: "0s"
  # Additional annotations on the HTTPRoute resource.
  annotations: {}

# Prometheus metrics scraping.
# prometheus_client starts a lightweight HTTP server on metrics.port — a port
# the Sanic app never listens on. The Ingress and HTTPRoute only target app.port,
# so the metrics endpoint is unreachable from outside the cluster by design.
# Set enabled: false to suppress the containerPort, Service, and METRICS_PORT
# env-var injection entirely (e.g. for local dev without a Prometheus stack).
metrics:
  enabled: true

  # Port the prometheus_client exposition server listens on inside the container.
  # Must not collide with app.port or opa.port.
  port: 9090

  # Prometheus Operator ServiceMonitor for automatic scrape discovery.
  # Requires kube-prometheus-stack or a standalone Prometheus Operator.
  serviceMonitor:
    enabled: false
    # How often Prometheus scrapes the endpoint.
    interval: "30s"
    # Per-scrape timeout (must be <= interval).
    scrapeTimeout: "10s"
    # Extra labels added to the ServiceMonitor — must satisfy the Prometheus
    # Operator's serviceMonitorSelector (e.g. {release: kube-prometheus-stack}).
    additionalLabels: {}
    # Deploy the ServiceMonitor into a different namespace (defaults to the
    # release namespace). Useful when the Prometheus Operator watches a single
    # dedicated monitoring namespace.
    namespace: ""

# Spread pods across failure domains for high availability.
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels: {} # filled in automatically by the chart

nodeSelector: {}
tolerations: []
affinity: {}

# Writable ephemeral directory mounted at /tmp (required when
# readOnlyRootFilesystem=true).
tmpDir:
  # "" = node disk, "Memory" = tmpfs (faster, counts against memory limit).
  medium: ""
  sizeLimit: 64Mi

# Open Policy Agent sidecar for authorization.
# When enabled, OPA runs as a localhost sidecar and the application routes all
# policy queries to http://localhost:<port> (fail-closed: unreachable OPA → deny).
opa:
  # Deploy the OPA sidecar alongside the application container.
  # Disable only when running OPA out-of-cluster or supplying OPA_URL via extraEnv.
  enabled: true

  image:
    repository: docker.io/openpolicyagent/opa
    # Static build: single binary, no shell, minimal attack surface.
    # Pin this to a specific release in production.
    tag: 1.15.2-static
    pullPolicy: IfNotPresent

  # Port OPA listens on inside the pod. Must match the OPA_URL used by the app.
  port: 8181

  # OPA log verbosity: error | warn | info | debug.
  logLevel: info

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 128Mi

  # Base-station and rover registry loaded into OPA as static data.
  # Changes here re-roll pods via the checksum/opa annotation on the Deployment.
  # For zero-downtime registry updates, migrate to OPA bundles and a bundle server.
  registry:
    # Map of base stations keyed by username / mountpoint.
    base_stations: {}
      # HERE4:
      #   mountpoint: HERE4
      #   password_hash: "$2a$12$..."

    # Map of rovers keyed by username.
    rovers: {}
      # demo:
      #   password_hash: "$2b$12$..."
      #   mountpoints: ["*"]  # "*" grants access to every mountpoint
