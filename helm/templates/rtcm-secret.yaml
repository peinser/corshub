{{- if and .Values.rtcmUdp.enabled (not .Values.rtcmUdp.secret.existingSecret) }}
{{- $name := printf "%s-rtcm" (include "corshub.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $token := .Values.rtcmUdp.secret.tokenSecret }}
{{- if not $token }}
{{-   if and $existing $existing.data (hasKey $existing.data "token-secret") }}
{{-     $token = index $existing.data "token-secret" | b64dec }}
{{-   else }}
{{-     $token = randAlphaNum 48 }}
{{-   end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corshub.labels" . | nindent 4 }}
type: Opaque
stringData:
  # HMAC secret for RTCM UDP session tokens. Generated once and preserved across
  # upgrades via a lookup unless an explicit value is supplied.
  token-secret: {{ $token | quote }}
  {{- if .Values.rtcmUdp.secret.signingKeyPem }}
  signing-key.pem: {{ .Values.rtcmUdp.secret.signingKeyPem | quote }}
  {{- end }}
{{- end }}
