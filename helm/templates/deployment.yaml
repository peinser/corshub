apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corshub.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corshub.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "corshub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Re-roll pods when app config or OPA config (registry / policies) changes.
        checksum/app: {{ toJson .Values.app | sha256sum }}
        {{- if .Values.opa.enabled }}
        checksum/opa: {{ toJson .Values.opa | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "corshub.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "corshub.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "corshub.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            {{- if .Values.opa.enabled }}
            - name: OPA_URL
              value: {{ printf "http://localhost:%d" (int .Values.opa.port) | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              # Give in-flight NTRIP streams a moment to drain before SIGTERM.
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- if .Values.opa.enabled }}
        - name: opa
          # OPA sidecar — policy engine running on localhost.
          # The main container routes all authorization queries to
          # http://localhost:<port> (fail-closed: unreachable OPA → deny).
          image: {{ include "corshub.opa.image" . }}
          imagePullPolicy: {{ .Values.opa.image.pullPolicy }}
          args:
            - run
            - --server
            - --addr=:{{ .Values.opa.port }}
            - --log-level={{ .Values.opa.logLevel }}
            - --log-format=json
            - /policies
            - /data
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: opa-http
              containerPort: {{ .Values.opa.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: opa-http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health?plugins
              port: opa-http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.opa.resources | nindent 12 }}
          volumeMounts:
            - name: opa-policies
              mountPath: /policies
              readOnly: true
            - name: opa-data
              mountPath: /data/corshub
              readOnly: true
        {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            medium: {{ .Values.tmpDir.medium | quote }}
            sizeLimit: {{ .Values.tmpDir.sizeLimit }}
        {{- if .Values.opa.enabled }}
        - name: opa-policies
          configMap:
            name: {{ include "corshub.opa.policiesConfigMapName" . }}
        - name: opa-data
          configMap:
            name: {{ include "corshub.opa.dataConfigMapName" . }}
        {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - {{ toYaml . | nindent 10 | trim }}
          labelSelector:
            matchLabels:
              {{- include "corshub.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
