apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corshub.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corshub.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "corshub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
        checksum/app: {{ toJson .Values.app | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "corshub.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "corshub.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "corshub.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
            {{- if .Values.rtcmUdp.enabled }}
            - name: rtcm-udp
              containerPort: {{ .Values.rtcmUdp.port }}
              protocol: UDP
            {{- end }}
          env:
            {{- if .Values.opa.enabled }}
            - name: OPA_URL
              value: {{ printf "http://%s-opa:%d" (include "corshub.fullname" .) (int .Values.opa.port) | quote }}
            {{- end }}
            - name: GNSS_ARP_CHANGE_THRESHOLD
              value: {{ .Values.gnss.arpChangeThresholdMeters | quote }}
            - name: GNSS_CNR_DBHZ_HIGH_THRESHOLD
              value: {{ .Values.gnss.highCnrThresholdDbhz | quote }}
            - name: AUTH_RATELIMIT_ENABLED
              value: {{ .Values.authRateLimit.enabled | quote }}
            - name: AUTH_RATELIMIT_CAPACITY
              value: {{ .Values.authRateLimit.capacity | quote }}
            - name: AUTH_RATELIMIT_REFILL_PER_SECOND
              value: {{ .Values.authRateLimit.refillPerSecond | quote }}
            {{- if .Values.metrics.enabled }}
            - name: PROMETHEUS_DISABLE_CREATED_SERIES
              value: "True"
            {{- end }}
            {{- if .Values.rtcmUdp.enabled }}
            - name: RTCM_UDP_ENABLED
              value: "true"
            - name: RTCM_UDP_HOST
              value: "0.0.0.0"
            - name: RTCM_UDP_PORT
              value: {{ .Values.rtcmUdp.port | quote }}
            - name: RTCM_UDP_ENDPOINT
              value: {{ required "rtcmUdp.advertisedEndpoint is required when rtcmUdp.enabled" .Values.rtcmUdp.advertisedEndpoint | quote }}
            - name: RTCM_SESSION_TOKEN_TTL
              value: {{ .Values.rtcmUdp.sessionTokenTtl | quote }}
            - name: RTCM_UDP_SESSION_TTL
              value: {{ .Values.rtcmUdp.sessionTtl | quote }}
            - name: RTCM_UDP_KEEPALIVE_INTERVAL
              value: {{ .Values.rtcmUdp.keepaliveInterval | quote }}
            - name: RTCM_UDP_MAX_DATAGRAM
              value: {{ .Values.rtcmUdp.maxDatagram | quote }}
            - name: RTCM_UDP_SIGNING_ENABLED
              value: {{ .Values.rtcmUdp.signing.enabled | quote }}
            - name: RTCM_SIGNING_ALLOW_EPHEMERAL
              value: {{ .Values.rtcmUdp.signing.allowEphemeral | quote }}
            - name: RTCM_SESSION_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "corshub.rtcmUdp.secretName" . }}
                  key: token-secret
            {{- if eq (include "corshub.rtcmUdp.hasKeyFile" .) "true" }}
            - name: RTCM_SIGNING_KEY_PATH
              value: /etc/corshub/rtcm/signing-key.pem
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              # Give in-flight NTRIP streams a moment to drain before SIGTERM.
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if eq (include "corshub.rtcmUdp.hasKeyFile" .) "true" }}
            - name: rtcm-signing-key
              mountPath: /etc/corshub/rtcm
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            medium: {{ .Values.tmpDir.medium | quote }}
            sizeLimit: {{ .Values.tmpDir.sizeLimit }}
        {{- if eq (include "corshub.rtcmUdp.hasKeyFile" .) "true" }}
        - name: rtcm-signing-key
          secret:
            secretName: {{ include "corshub.rtcmUdp.secretName" . }}
            items:
              - key: signing-key.pem
                path: signing-key.pem
        {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - {{ toYaml . | nindent 10 | trim }}
          labelSelector:
            matchLabels:
              {{- include "corshub.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
