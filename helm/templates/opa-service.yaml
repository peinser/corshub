{{- if .Values.opa.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "corshub.fullname" . }}-opa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corshub.labels" . | nindent 4 }}
    app.kubernetes.io/component: opa
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.opa.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "corshub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: opa
{{- end }}
