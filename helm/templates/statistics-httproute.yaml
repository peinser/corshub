{{- if and .Values.statistics.enabled .Values.statistics.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "corshub.fullname" . }}-statistics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corshub.labels" . | nindent 4 }}
    app.kubernetes.io/component: statistics
  {{- with .Values.statistics.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.statistics.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.statistics.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /statistics
      backendRefs:
        - name: {{ include "corshub.fullname" . }}-statistics
          port: 80
      timeouts:
        request: "30s"
        backendRequest: "30s"
{{- end }}
