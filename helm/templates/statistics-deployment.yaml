{{- if .Values.statistics.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "corshub.fullname" . }}-statistics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corshub.labels" . | nindent 4 }}
    app.kubernetes.io/component: statistics
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "corshub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: statistics
  template:
    metadata:
      annotations:
        checksum/statistics: {{ toJson .Values.statistics | sha256sum }}
      labels:
        {{- include "corshub.labels" . | nindent 8 }}
        app.kubernetes.io/component: statistics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: {{ .Values.statistics.image.repository }}:{{ .Values.statistics.image.tag }}
          imagePullPolicy: {{ .Values.statistics.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /statistics/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /statistics/
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.statistics.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "corshub.fullname" . }}-statistics
        - name: tmp
          emptyDir:
            medium: ""
            sizeLimit: 16Mi
        - name: nginx-cache
          emptyDir:
            medium: ""
            sizeLimit: {{ .Values.statistics.cacheSizeLimit }}
{{- end }}
