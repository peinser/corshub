{{- if .Values.metrics.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "corshub.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "corshub.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
spec:
  # ClusterIP only — never referenced by any Ingress or HTTPRoute.
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "corshub.selectorLabels" . | nindent 4 }}
{{- end }}
